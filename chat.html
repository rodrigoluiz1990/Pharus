<!-- chat.html -->
<div id="chatContainer" class="chat-hidden">
    <div class="chat-header">
        <div class="chat-header-info">
            <h3>Chat</h3>
            <span id="onlineCount">0 online</span>
        </div>
    </div>
    
    <div class="chat-contacts">
        <div class="chat-search">
            <input type="text" id="chatSearch" placeholder="Buscar contatos...">
            <i class="fas fa-search"></i>
        </div>
        <div id="contactsList" class="contacts-list"></div>
    </div>
    
    <div class="chat-messages-container">
        <div id="chatHeader" class="chat-conversation-header">
            <button id="backToContacts" class="back-button" type="button" title="Voltar para contatos" aria-label="Voltar para contatos">
                <span class="back-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
                        <path d="M15.5 5.5L9 12l6.5 6.5" />
                    </svg>
                </span>
                <span class="back-label">Voltar</span>
            </button>
            <div class="chat-contact-info">
                <div id="currentChatAvatar" class="contact-avatar">U</div>
                <div class="contact-details">
                    <div id="currentChatName" class="contact-name">Selecione um contato</div>
                    <div id="currentChatStatus" class="contact-status">Offline</div>
                </div>
            </div>
        </div>
        
        <div id="chatMessages" class="chat-messages"></div>
        <div id="selectedAttachmentInfo" class="selected-attachment-info" style="display: none;"></div>
        
        <div class="chat-input-container">
            <div class="chat-input-actions">
                <button class="chat-input-btn" id="attachFileBtn" title="Anexar arquivo"><i class="fas fa-paperclip"></i></button>
                <button class="chat-input-btn" id="emojiBtn" title="Emojis"><i class="fas fa-face-smile"></i></button>
            </div>
            <input type="text" id="messageInput" placeholder="Digite uma mensagem..." maxlength="500">
            <input type="file" id="chatAttachmentInput" style="display: none;">
            <button id="sendMessage" class="send-button" disabled>
                <i class="fas fa-paper-plane"></i>
            </button>
            <div id="emojiPicker" class="emoji-picker hidden" aria-hidden="true"></div>
        </div>
    </div>
</div>

<button id="chatToggle" class="chat-toggle">
    <i class="fas fa-comment"></i>
    <span id="unreadBadge" class="unread-badge">0</span>
</button>
