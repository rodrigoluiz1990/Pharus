services:
  db:
    image: ghcr.io/rodrigoluiz1990/pharus-db:latest
    restart: unless-stopped
    environment:
      POSTGRES_DB: pharus
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pharus_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pharus"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    image: ghcr.io/rodrigoluiz1990/pharus-app:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 3000
      PGHOST: db
      PGPORT: 5432
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: pharus
    ports:
      - "3300:3000"
    volumes:
      - pharus_uploads:/app/backend/uploads

volumes:
  pharus_pgdata:
  pharus_uploads:
