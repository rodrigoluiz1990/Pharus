<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pharus - Cadastro de Clientes</title>
    <link rel="icon" type="image/svg+xml" href="lighthouse-favicon.svg?v=20260321d">
    <link rel="alternate icon" type="image/png" href="lighthouse-favicon-32.png?v=20260321d">
    <link rel="shortcut icon" type="image/png" href="lighthouse-favicon-32.png?v=20260321d">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/sidebar.css">
    <link rel="stylesheet" href="styles/clients.css">
</head>
<body>
    <div class="container">
        <div id="sidebar-container"></div>

        <div class="content">
            <div class="header">
                <div class="project-title">
                    <h2>Cadastro de Clientes</h2>
                </div>
            </div>

            <div class="clients-view">
                <div class="clients-header">
                    <h3>Clientes</h3>
                    <button class="btn-add-client" id="addClientBtn">
                        <i class="fas fa-plus"></i> Novo Cliente
                    </button>
                </div>

                <div class="clients-filters">
                    <input type="text" id="clientSearch" class="form-control" placeholder="Buscar por nome, sigla, contato, email, telefone ou CNPJ...">
                    <select id="clientStatusFilter" class="form-control">
                        <option value="">Todos os status</option>
                        <option value="active">Ativo</option>
                        <option value="inactive">Inativo</option>
                    </select>
                </div>

                <div class="clients-table-container">
                    <table class="clients-table">
                        <thead>
                            <tr>
                                <th>Nome</th>
                                <th>Sigla</th>
                                <th>Contato</th>
                                <th>Email</th>
                                <th>Telefone</th>
                                <th>Status</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="clientsTableBody">
                            <tr>
                                <td colspan="7" class="loading-clients">
                                    <i class="fas fa-spinner fa-spin"></i> Carregando clientes...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="modal-overlay client-modal" id="clientModal">
            <div class="modal">
                <div class="modal-header">
                    <h3 id="clientModalTitle">Novo Cliente</h3>
                    <button class="modal-close" id="closeClientModal">&times;</button>
                </div>
                <div class="modal-body">
                    <form id="clientForm" class="client-form">
                        <input type="hidden" id="clientId">

                        <div class="client-form-tabs" role="tablist" aria-label="Seções do cadastro de cliente">
                            <button type="button" class="client-tab-btn active" data-client-tab="general" aria-selected="true">
                                <i class="fas fa-id-card"></i> Geral
                            </button>
                            <button type="button" class="client-tab-btn" data-client-tab="address" aria-selected="false">
                                <i class="fas fa-map-marker-alt"></i> Endereço
                            </button>
                            <button type="button" class="client-tab-btn" data-client-tab="remote" aria-selected="false">
                                <i class="fas fa-desktop"></i> Conexão Remota
                            </button>
                        </div>

                        <section class="client-tab-panel active" data-client-panel="general">
                            <div class="form-row">
                                <div class="form-group">
                                    <label for="clientName">Nome *</label>
                                    <input type="text" id="clientName" class="form-control" required>
                                </div>
                                <div class="form-group">
                                    <label for="clientAcronym">Sigla</label>
                                    <input type="text" id="clientAcronym" class="form-control" maxlength="20" placeholder="Ex: JL">
                                </div>
                                <div class="form-group">
                                    <label for="clientContactName">Contato</label>
                                    <input type="text" id="clientContactName" class="form-control">
                                </div>
                            </div>

                            <div class="form-row">
                                <div class="form-group">
                                    <label for="clientCnpj">CNPJ</label>
                                    <input type="text" id="clientCnpj" class="form-control" placeholder="00.000.000/0000-00">
                                </div>
                                <div class="form-group">
                                    <label for="clientPhone">Telefone</label>
                                    <input type="text" id="clientPhone" class="form-control">
                                </div>
                                <div class="form-group">
                                    <label for="clientEmail">Email</label>
                                    <input type="email" id="clientEmail" class="form-control">
                                </div>
                            </div>

                            <div class="form-row">
                                <div class="form-group">
                                    <label for="clientStatus">Status</label>
                                    <select id="clientStatus" class="form-control">
                                        <option value="active">Ativo</option>
                                        <option value="inactive">Inativo</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label for="clientMunicipalRegistration">Inscrição Municipal</label>
                                    <input type="text" id="clientMunicipalRegistration" class="form-control">
                                </div>
                                <div class="form-group">
                                    <label for="clientStateRegistration">Inscrição Estadual</label>
                                    <input type="text" id="clientStateRegistration" class="form-control">
                                </div>
                            </div>

                            <div class="form-row">
                                <div class="form-group full-row">
                                    <label for="clientNotes">Observações</label>
                                    <textarea id="clientNotes" class="form-control" rows="3"></textarea>
                                </div>
                            </div>
                        </section>

                        <section class="client-tab-panel" data-client-panel="address">
                            <div class="form-row">
                                <div class="form-group">
                                    <label for="clientAddressStreet">Logradouro</label>
                                    <input type="text" id="clientAddressStreet" class="form-control" placeholder="Rua, avenida, etc.">
                                </div>
                                <div class="form-group">
                                    <label for="clientAddressNumber">Numero</label>
                                    <input type="text" id="clientAddressNumber" class="form-control" placeholder="Ex: 123">
                                </div>
                                <div class="form-group">
                                    <label for="clientAddressComplement">Complemento</label>
                                    <input type="text" id="clientAddressComplement" class="form-control" placeholder="Sala, bloco, etc.">
                                </div>
                            </div>

                            <div class="form-row">
                                <div class="form-group">
                                    <label for="clientAddressDistrict">Bairro</label>
                                    <input type="text" id="clientAddressDistrict" class="form-control">
                                </div>
                                <div class="form-group">
                                    <label for="clientAddressCity">Cidade</label>
                                    <input type="text" id="clientAddressCity" class="form-control">
                                </div>
                                <div class="form-group">
                                    <label for="clientAddressState">UF</label>
                                    <input type="text" id="clientAddressState" class="form-control" maxlength="2" placeholder="SP">
                                </div>
                            </div>

                            <div class="form-row">
                                <div class="form-group">
                                    <label for="clientAddressZipCode">CEP</label>
                                    <input type="text" id="clientAddressZipCode" class="form-control" placeholder="00000-000">
                                </div>
                                <div class="form-group zip-action-group">
                                    <label>&nbsp;</label>
                                    <button type="button" class="btn btn-secondary zip-search-btn" id="searchAddressByZipBtn">
                                        <i class="fas fa-search-location"></i> Buscar CEP
                                    </button>
                                </div>
                            </div>
                        </section>

                        <section class="client-tab-panel" data-client-panel="remote">
                            <div class="form-row">
                                <div class="form-group">
                                    <label for="clientRemoteTool">Ferramenta</label>
                                    <input type="text" id="clientRemoteTool" class="form-control" value="AnyDesk" placeholder="Ex: AnyDesk">
                                </div>
                                <div class="form-group">
                                    <label for="clientRemoteAccessId">ID de acesso</label>
                                    <input type="text" id="clientRemoteAccessId" class="form-control" placeholder="Ex: 123 456 789">
                                </div>
                                <div class="form-group">
                                    <label for="clientRemotePassword">Senha de acesso</label>
                                    <input type="text" id="clientRemotePassword" class="form-control" placeholder="Senha remota">
                                </div>
                            </div>

                            <div class="form-row">
                                <div class="form-group full-row">
                                    <label for="clientRemoteNotes">Observações da conexão remota</label>
                                    <textarea id="clientRemoteNotes" class="form-control" rows="3"></textarea>
                                </div>
                            </div>

                            <div class="form-row">
                                <div class="form-group full-row remote-connection-actions">
                                    <button type="button" class="btn btn-secondary" id="addRemoteConnectionBtn">
                                        <i class="fas fa-plus"></i> Adicionar conexão
                                    </button>
                                    <button type="button" class="btn btn-secondary" id="clearRemoteConnectionFormBtn">
                                        <i class="fas fa-eraser"></i> Limpar campos
                                    </button>
                                </div>
                            </div>

                            <div class="remote-connections-table-wrap">
                                <table class="remote-connections-table">
                                    <thead>
                                        <tr>
                                            <th>Ferramenta</th>
                                            <th>ID</th>
                                            <th>Senha</th>
                                            <th>Observações</th>
                                            <th>Ações</th>
                                        </tr>
                                    </thead>
                                    <tbody id="remoteConnectionsTableBody">
                                        <tr>
                                            <td colspan="5" class="empty-remote-connections">Nenhuma conexão adicionada.</td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </section>
                        <div class="form-actions">
                            <button type="submit" class="btn btn-primary">Salvar</button>
                            <button type="button" class="btn btn-danger" id="deleteClient" style="display:none;">Excluir</button>
                            <button type="button" class="btn btn-secondary" id="cancelClient">Cancelar</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <div id="globalLoading" class="loading-overlay">
            <div class="loading-spinner">
                <i class="fas fa-spinner fa-spin"></i>
            </div>
            <span>Carregando...</span>
        </div>

        <script src="scripts/local-supabase-client.js"></script>
        <script src="scripts/supabase-config.js"></script>
        <script src="scripts/auth.js"></script>
        <script src="scripts/component-loader.js"></script>
        <script src="scripts/page-bootstrap.js"></script>
        <script src="scripts/profile-modal.js"></script>
        <script src="scripts/chat.js"></script>
    </div>
</body>
</html>
