<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pharus - Dashboard</title>
    <link rel="icon" type="image/svg+xml" href="lighthouse-favicon.svg?v=20260321d">
    <link rel="alternate icon" type="image/png" href="lighthouse-favicon-32.png?v=20260321d">
    <link rel="shortcut icon" type="image/png" href="lighthouse-favicon-32.png?v=20260321d">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/sidebar.css">
    <link rel="stylesheet" href="styles/dashboard.css">
</head>
<body>
    <div class="container">
        <div id="sidebar-container"></div>
        <div class="content">
            <div class="header">
                <div class="project-title">
                    <h2>Dashboard</h2>
                </div>
            </div>
            <div class="dashboard-view">
                <div class="dashboard-summary-grid">
                    <article class="dashboard-summary-card">
                        <div class="summary-label">Total de tarefas</div>
                        <div id="dashTotalTasks" class="summary-value">0</div>
                    </article>
                    <article class="dashboard-summary-card warning">
                        <div class="summary-label">Atrasadas</div>
                        <div id="dashOverdueTasks" class="summary-value">0</div>
                    </article>
                    <article class="dashboard-summary-card info">
                        <div class="summary-label">Prazo em 7 dias</div>
                        <div id="dashDueSoonTasks" class="summary-value">0</div>
                    </article>
                    <article class="dashboard-summary-card success">
                        <div class="summary-label">Concluidas</div>
                        <div id="dashCompletedTasks" class="summary-value">0</div>
                    </article>
                </div>

                <div class="dashboard-panels-grid">
                    <section class="dashboard-panel">
                        <h3>Status das Tarefas</h3>
                        <div id="dashStatusBreakdown" class="dashboard-breakdown-list"></div>
                    </section>

                    <section class="dashboard-panel">
                        <h3>Prioridades</h3>
                        <div id="dashPriorityBreakdown" class="dashboard-breakdown-list"></div>
                    </section>
                </div>

                <div class="dashboard-panels-grid">
                    <section class="dashboard-panel">
                        <h3>Top Responsaveis</h3>
                        <div id="dashTopAssignees" class="dashboard-ranked-list"></div>
                    </section>

                    <section class="dashboard-panel">
                        <h3>Top Clientes</h3>
                        <div id="dashTopClients" class="dashboard-ranked-list"></div>
                    </section>
                </div>

                <section class="dashboard-panel">
                    <h3>Proximas Entregas</h3>
                    <div id="dashUpcomingList" class="dashboard-upcoming-list"></div>
                </section>
            </div>
        </div>
    </div>

    <script src="scripts/local-supabase-client.js"></script>
    <script src="scripts/supabase-config.js"></script>
    <script src="scripts/storage.js"></script>
    <script src="scripts/component-loader.js"></script>
    <script src="scripts/profile-modal.js"></script>
    <script src="scripts/dashboard.js"></script>
    <script src="scripts/chat.js"></script>
</body>
</html>
