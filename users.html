<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pharus - Controle de Usuários</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/sidebar.css">
    <link rel="stylesheet" href="styles/users.css">
</head>

<body>
    <div class="container">
        <!-- Container para o sidebar component -->
        <div id="sidebar-container"></div>

        <!-- Área de Conteúdo -->
        <div class="content">
            <div class="header">
                <div class="project-title">
                    <h2>Controle de Usuários</h2>
                </div>
            </div>

            <!-- Tela de Controle de Usuários -->
            <div class="users-view">
                <div class="users-header">
                    <h3>Gerenciamento de Usuários</h3>
                    <button class="btn-add-user" id="addUserBtn">
                        <i class="fas fa-plus"></i> Novo Usuário
                    </button>
                </div>

                <div id="usersTableContainer">
                    <table class="users-table">
                        <thead>
                            <tr>
                                <th>Nome</th>
                                <th>E-mail</th>
                                <th>Função</th>
                                <th>Status</th>
                                <th>Último Acesso</th>
                                <th>Criado em</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="usersTableBody">
                            <tr>
                                <td colspan="7" class="loading-users">
                                    <i class="fas fa-spinner fa-spin"></i> Carregando usuários...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Modal para Criar/Editar Usuário -->
        <div class="modal-overlay user-modal" id="userModal">
            <div class="modal">
                <div class="modal-header">
                    <h3 id="userModalTitle">Novo Usuário</h3>
                    <button class="modal-close" id="closeUserModal">&times;</button>
                </div>
                <div class="modal-body">
                    <form id="userForm" class="user-form">
                        <input type="hidden" id="userId">
                        <div class="form-row">
                            <div class="form-group avatar-form-group">
                                <label>Avatar</label>
                                <div class="user-avatar-config">
                                    <div class="user-avatar-preview" id="userAvatarPreview">U</div>
                                    <div class="user-avatar-controls">
                                        <div class="user-avatar-control-row">
                                            <label for="userAvatarColor">Cor</label>
                                            <select id="userAvatarColor" class="form-control">
                                                <option value="#3498db">Azul</option>
                                                <option value="#4f46e5">Indigo</option>
                                                <option value="#16a34a">Verde</option>
                                                <option value="#f59e0b">Laranja</option>
                                                <option value="#ef4444">Vermelho</option>
                                                <option value="#0ea5e9">Ciano</option>
                                                <option value="#a855f7">Roxo</option>
                                                <option value="#334155">Grafite</option>
                                            </select>
                                        </div>
                                        <div class="user-avatar-control-row">
                                            <label for="userAvatarIcon">Icone</label>
                                            <select id="userAvatarIcon" class="form-control">
                                                <option value="">Iniciais do nome</option>
                                                <option value="user">Usuario</option>
                                                <option value="user-tie">Executivo</option>
                                                <option value="headset">Suporte</option>
                                                <option value="code">Dev</option>
                                                <option value="wrench">Tecnico</option>
                                                <option value="briefcase">Negocios</option>
                                                <option value="star">Estrela</option>
                                                <option value="bolt">Raio</option>
                                            </select>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="userName">Nome Completo *</label>
                                <input type="text" id="userName" class="form-control" required>
                            </div>
                            <div class="form-group">
                                <label for="userEmail">E-mail *</label>
                                <input type="email" id="userEmail" class="form-control" required>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="userRole">Função *</label>
                                <select id="userRole" class="form-control" required>
                                    <option value="user">Usuário</option>
                                    <option value="manager">Gerente</option>
                                    <option value="admin">Administrador</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="userStatus">Status *</label>
                                <select id="userStatus" class="form-control" required>
                                    <option value="active">Ativo</option>
                                    <option value="inactive">Inativo</option>
                                    <option value="pending">Pendente</option>
                                </select>
                            </div>
                        </div>
                        
                        <div class="form-row">
                            <div class="form-group">
                                <label for="userPassword">Senha</label>
                                <input type="password" id="userPassword" class="form-control" 
                                    autocomplete="new-password" minlength="6">
                                <small class="form-text">Deixe em branco para não alterar</small>
                            </div>
                            <div class="form-group">
                                <label for="userConfirmPassword">Confirmar Senha</label>
                                <input type="password" id="userConfirmPassword" class="form-control" 
                                    autocomplete="new-password">
                            </div>
                        </div>
                        
                        <div class="form-actions">
                            <button type="submit" class="btn btn-primary">Salvar</button>
                            <button type="button" class="btn btn-danger" id="deleteUser" style="display: none;">Excluir</button>
                            <button type="button" class="btn btn-secondary" id="cancelUser">Cancelar</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- Loading Overlay global -->
        <div id="globalLoading" class="loading-overlay">
            <div class="loading-spinner">
                <i class="fas fa-spinner fa-spin"></i>
            </div>
            <span>Carregando...</span>
        </div>

        <!-- Scripts -->
        <script src="scripts/local-supabase-client.js"></script>
        <script src="scripts/supabase-config.js"></script>
        <script src="scripts/auth.js"></script>
        <script src="scripts/component-loader.js"></script>
        <script src="scripts/page-bootstrap.js"></script>
        <script src="scripts/profile-modal.js"></script>
        <script src="scripts/chat.js"></script>
    </div>
</body>
</html>
