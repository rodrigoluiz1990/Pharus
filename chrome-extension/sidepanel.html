<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pharus Post-it</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-top">
        <h1 id="projectHeaderTitle">Pharus - Projeto</h1>
        <div class="header-actions">
          <button id="logoutBtn" class="icon-btn hidden" title="Sair" aria-label="Sair">⎋</button>
          <button id="openChatBtn" class="icon-btn" title="Abrir chat" aria-label="Abrir chat">💬</button>
          <button id="refreshBtn" class="icon-btn" title="Atualizar">↻</button>
          <button id="settingsToggleBtn" class="icon-btn" title="Configurações">⚙</button>
        </div>
      </div>
      <div id="modeSwitch" class="mode-switch" role="tablist" aria-label="Modo de visualização">
        <button id="modeTasksBtn" class="mode-btn active" role="tab" aria-selected="true" title="Modo Tarefas">Tarefas</button>
        <button id="modeAgendaBtn" class="mode-btn" role="tab" aria-selected="false" title="Modo Agenda">Agenda</button>
        <button id="modeNoticesBtn" class="mode-btn" role="tab" aria-selected="false" title="Modo Avisos">Avisos</button>
        <button id="modeDetachedBtn" class="mode-btn" role="tab" aria-selected="false" title="Post-it Avulso">Avulso</button>
      </div>
    </header>

    <section id="authPanel" class="settings">
      <h2 class="auth-title">Login da Extensão</h2>
      <label>Servidor
        <input id="loginApiBaseInput" type="text" placeholder="http://localhost:3000">
      </label>
      <label>E-mail do usuário
        <input id="loginEmailInput" type="email" placeholder="admin@pharus.local">
      </label>
      <label>Senha
        <input id="loginPasswordInput" type="password" placeholder="Digite sua senha">
      </label>
      <div class="settings-actions">
        <button id="loginBtn">Entrar</button>
      </div>
      <div id="authStatusText" class="status hidden"></div>
    </section>

    <section id="settingsPanel" class="settings hidden">
      <label class="settings-checkbox" for="onlyAssignedInput">
        <input id="onlyAssignedInput" type="checkbox" checked>
        Apenas tarefas vinculadas ao usuário
      </label>
      <label>Tipo da tarefa
        <select id="taskTypeFilterInput">
          <option value="all">Todos</option>
          <option value="new">Novo</option>
          <option value="optimization">Otimização</option>
          <option value="improvement">Melhoria</option>
          <option value="discussion">Para discutir</option>
          <option value="suggestion">Sugestão</option>
          <option value="issue">Problema</option>
          <option value="epic">Épico</option>
        </select>
      </label>
      <label>Prioridade
        <select id="taskPriorityFilterInput">
          <option value="all">Todas</option>
          <option value="very_high">Muito alta</option>
          <option value="high">Alta</option>
          <option value="medium">Média</option>
          <option value="low">Baixa</option>
          <option value="very_low">Muito baixa</option>
        </select>
      </label>
      <label>Limite
        <input id="limitInput" type="number" min="1" max="50" value="12">
      </label>
      <div class="settings-actions">
        <button id="saveSettingsBtn">Salvar</button>
        <button id="openBoardBtn" class="secondary">Abrir painel completo</button>
      </div>
    </section>

    <section id="focusTasksSection">
      <div id="statusText" class="status">Carregando tarefas...</div>
      <ul id="tasksList" class="tasks-list"></ul>
    </section>

    <section id="noticesSection" class="hidden">
      <div id="noticesStatusText" class="status">Carregando avisos...</div>
      <ul id="noticesList" class="tasks-list"></ul>
    </section>

    <section id="agendaSection" class="hidden">
      <div id="agendaStatusText" class="status">Carregando agenda do dia...</div>
      <ul id="agendaList" class="tasks-list"></ul>
    </section>

    <section id="detachedSection" class="hidden">
      <div id="detachedStatusText" class="status">Post-its avulsos</div>
      <div class="detached-composer">
        <input id="detachedInput" type="text" placeholder="Nova tarefa avulsa...">
        <button id="addDetachedBtn" type="button">Adicionar</button>
      </div>
      <ul id="detachedList" class="tasks-list"></ul>
    </section>
  </div>

  <div id="chatOverlay" class="chat-overlay hidden" aria-hidden="true">
    <div class="chat-overlay-header">
      <strong>Chat Pharus</strong>
      <div class="chat-overlay-actions">
        <button id="chatOverlayOpenTabBtn" class="icon-btn" title="Abrir em aba">↗</button>
        <button id="chatOverlayCloseBtn" class="icon-btn" title="Fechar chat">✕</button>
      </div>
    </div>
    <iframe id="chatOverlayFrame" class="chat-overlay-frame" title="Chat Pharus"></iframe>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
