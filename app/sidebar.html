<div class="sidebar">
    <div class="sidebar-user-section top-user-menu">
        <div class="user-info" id="sidebarUserInfo">
            <div class="avatar" id="sidebarUserAvatar">U</div>
            <div class="user-details">
                <span class="user-name" id="sidebarUserName">Usuário</span>
                <span class="user-email" id="sidebarUserEmail">carregando...</span>
            </div>
            <div class="dropdown">
                <button class="btn btn-secondary" id="sidebarUserDropdown">v</button>
                <div class="dropdown-menu" id="sidebarUserMenu">
                    <div class="dropdown-item" data-action="profile">
                        <i class="fas fa-user"></i> Meu Perfil
                    </div>
                    <div class="dropdown-item" data-action="logout">
                        <i class="fas fa-sign-out-alt"></i> Sair
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="profileModal">
        <div class="modal">
            <div class="modal-header">
                <h3>Meu Perfil</h3>
                <button class="modal-close" id="closeProfileModal">&times;</button>
            </div>
            <div class="modal-body">
                <form id="profileForm" class="user-form">
                    <div class="form-row">
                        <div class="form-group avatar-form-group">
                            <label>Avatar</label>
                            <div class="user-avatar-config">
                                <div class="user-avatar-preview" id="profileAvatarPreview">U</div>
                                <div class="user-avatar-controls">
                                    <div class="user-avatar-control-row">
                                        <label for="profileAvatarColor">Cor</label>
                                        <select id="profileAvatarColor" class="form-control">
                                            <option value="#3498db">Azul</option>
                                            <option value="#4f46e5">Índigo</option>
                                            <option value="#16a34a">Verde</option>
                                            <option value="#f59e0b">Laranja</option>
                                            <option value="#ef4444">Vermelho</option>
                                            <option value="#0ea5e9">Ciano</option>
                                            <option value="#a855f7">Roxo</option>
                                            <option value="#334155">Grafite</option>
                                        </select>
                                    </div>
                                <div class="user-avatar-control-row">
                                    <label for="profileAvatarIcon">Ícone</label>
                                    <select id="profileAvatarIcon" class="form-control">
                                        <option value="">Iniciais do nome</option>
                                        <option value="user">Usuário</option>
                                        <option value="user-tie">Executivo</option>
                                        <option value="headset">Suporte</option>
                                        <option value="code">Dev</option>
                                        <option value="wrench">Técnico</option>
                                        <option value="briefcase">Negócios</option>
                                        <option value="star">Estrela</option>
                                        <option value="bolt">Raio</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="profileName">Nome Completo *</label>
                            <input type="text" id="profileName" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label for="profileEmail">E-mail *</label>
                            <input type="email" id="profileEmail" class="form-control" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="profilePermissionGroup">Grupo de permissão</label>
                            <select id="profilePermissionGroup" class="form-control" disabled>
                                <option value="">Sem grupo</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="profileStatus">Status</label>
                            <select id="profileStatus" class="form-control" disabled>
                                <option value="active">Ativo</option>
                                <option value="inactive">Inativo</option>
                                <option value="pending">Pendente</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group profile-full-row">
                            <label for="profileCurrentPassword">Senha Atual (para alterar senha)</label>
                            <input type="password" id="profileCurrentPassword" class="form-control">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="profileNewPassword">Nova Senha</label>
                            <input type="password" id="profileNewPassword" class="form-control" minlength="6">
                        </div>
                        <div class="form-group">
                            <label for="profileConfirmPassword">Confirmar Nova Senha</label>
                            <input type="password" id="profileConfirmPassword" class="form-control">
                        </div>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">Salvar Alterações</button>
                        <button type="button" class="btn btn-secondary" id="cancelProfile">Cancelar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="logo">
        <button class="sidebar-collapse-btn" id="sidebarCollapseBtn" type="button" aria-label="Recolher menu">
            <i class="fas fa-angle-double-left"></i>
        </button>
        <h1 id="sidebarProjectTitle">Pharus</h1>
    </div>

    <div class="menu-items">
        <div class="menu-item" data-page="dashboard.html">
            <i class="fas fa-chart-line"></i>
            <span>Dashboard</span>
        </div>
        <div class="menu-item" data-page="agenda.html">
            <i class="fas fa-calendar-alt"></i>
            <span>Agenda</span>
        </div>
        <div class="menu-item" data-page="avisos.html">
            <i class="fas fa-bullhorn"></i>
            <span>Quadro de Avisos</span>
        </div>
        <div class="menu-item" data-page="quadrodetarefas.html">
            <i class="fas fa-th"></i>
            <span>Quadro de Tarefas</span>
        </div>
        <div class="menu-item" data-page="clientes.html">
            <i class="fas fa-building"></i>
            <span>Clientes</span>
        </div>
        <div class="menu-item" data-page="chatconversas.html">
            <i class="fas fa-comment"></i>
            <span>Chat</span>
            <span class="sidebar-chat-unread-badge" id="sidebarChatUnreadBadge" style="display:none;">0</span>
        </div>
        <div class="menu-item" data-page="relatorios.html">
            <i class="fas fa-file-alt"></i>
            <span>Relatórios</span>
        </div>
        <div class="menu-item" id="customSidebarMenuItem" style="display:none;">
            <i class="fas fa-link"></i>
            <span id="customSidebarMenuLabel">Menu personalizado</span>
        </div>
        <div class="menu-item" data-page="configuracoes.html">
            <i class="fas fa-cog"></i>
            <span>Configurações</span>
        </div>
        
    </div>

    <div class="view-toggle" id="boardViewToggle" style="display: none;">
        <div class="toggle-buttons">
            <button class="toggle-btn active" id="boardViewBtn">
                <i class="fas fa-th"></i> Quadro
            </button>
            <button class="toggle-btn" id="sociousViewBtn">
                <i class="fas fa-table"></i> Tabela
            </button>
            <button class="toggle-btn" id="titleOnlyViewBtn">
                <i class="fas fa-font"></i> Título
            </button>
        </div>
    </div>
</div>
